<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تنبيه أمني - سناب شات</title>
    <style>
        body {
            background-color: #FFFC00; /* لون السناب الشهير */
            color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        #prank-screen { display: block; width: 100%; padding: 20px; }
        .snap-icon { font-size: 80px; margin-bottom: 20px; }
        .loading-text { font-size: 24px; font-weight: bold; color: #d32f2f; }
        
        #reveal-screen { display: none; }
        .emoji { font-size: 80px; }
        h1 { font-size: 32px; color: #333; margin-top: 10px; }
        .safe-message { color: #000; font-size: 22px; font-weight: bold; margin-top: 20px; }

        .progress-bar {
            width: 80%;
            background-color: #fff;
            height: 12px;
            border-radius: 10px;
            margin: 25px auto;
            border: 2px solid #000;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #000;
            animation: grow 2.2s forwards; /* سريعة جداً للرعب اللحظي */
        }
        @keyframes grow { to { width: 100%; } }
    </style>
</head>
<body>

    <div id="prank-screen">
        <div class="snap-icon">👻</div>
        <h2 class="loading-text">تم اختراق الحماية الأمنية!</h2>
        <p style="font-size: 18px;">جاري سحب الصور والذكريات (Memories) وحذفها نهائياً...</p>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <p style="font-weight: bold; color: #333;">System Status: Security Breach Detected</p>
    </div>

    <div id="reveal-screen">
        <div class="emoji">🤣👻</div>
        <h1>ههههههههههههههههههه</h1>
        <div class="safe-message">صورك عندي وكل شيء بأمان! 🔐</div>
        <p style="font-size: 18px; margin-top: 15px;">لا يوقف قلبك.. حبيت أمقلبك شوية!</p>
        <p style="color: #666; margin-top: 40px; font-size: 14px;">مع تحيات الهاكر: أسماء 😎</p>
    </div>

    <script>
        // الاختفاء بعد 3 ثوانٍ بالضبط
        setTimeout(function() {
            document.getElementById('prank-screen').style.display = 'none';
            document.getElementById('reveal-screen').style.display = 'block';
            document.body.style.backgroundColor = '#ffffff';
        }, 3000); 
    </script>

</body>
</html>
